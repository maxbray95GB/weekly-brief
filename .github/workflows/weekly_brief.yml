name: Weekly Brief
on:
  schedule:
    - cron: '30 8 * * 5'
  workflow_dispatch:
jobs:
  send-weekly-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run weekly brief
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GRANOLA_REFRESH_TOKEN: ${{ secrets.GRANOLA_REFRESH_TOKEN }}
          GRANOLA_CLIENT_ID: ${{ secrets.GRANOLA_CLIENT_ID }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python main.py
      - name: Save continuity summary
        run: |
          git config user.name "weekly-brief-bot"
          git config user.email "bot@weekly-brief"
          git add last_week_summary.json
          git diff --staged --quiet || git commit -m "Update summary [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

